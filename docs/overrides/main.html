{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <style>
    /* FORÇA VERMELHO SABIN #e61318 EM TUDO */
    
    /* Variáveis CSS do tema */
    :root {
      --md-primary-fg-color: #e61318 !important;
      --md-primary-fg-color--light: #e61318 !important;
      --md-primary-fg-color--dark: #c41e3a !important;
      --md-accent-fg-color: #e61318 !important;
      --md-accent-fg-color--transparent: #e613181a !important;
    }

    /* Override das cores de paleta red */
    [data-md-color-primary=red],
    [data-md-color-accent=red] {
      --md-primary-fg-color: #e61318 !important;
      --md-primary-fg-color--light: #e61318 !important;
      --md-primary-fg-color--dark: #c41e3a !important;
      --md-accent-fg-color: #e61318 !important;
      --md-accent-fg-color--transparent: #e613181a !important;
    }

    /* Header */
    .md-header {
      background-color: #e61318 !important;
      color: #fff !important;
    }

    .md-header__title {
      color: #fff !important;
    }

    .md-header__button {
      color: #fff !important;
    }

    .md-header-nav__button {
      color: #fff !important;
    }

    /* Tabs */
    .md-tabs {
      background-color: #e61318 !important;
      color: #fff !important;
    }

    .md-tabs__list {
      background-color: #e61318 !important;
    }

    .md-tabs__link {
      color: rgba(255, 255, 255, 0.7) !important;
    }

    .md-tabs__link--active {
      border-bottom-color: #fff !important;
      color: #fff !important;
    }

    .md-tabs__link:hover {
      color: #fff !important;
    }

    /* Botões */
    .md-button {
      background-color: #e61318 !important;
      color: #fff !important;
      border-color: #e61318 !important;
    }

    .md-button:visited {
      background-color: #e61318 !important;
      color: #fff !important;
    }

    .md-button:hover,
    .md-button:focus {
      background-color: #c41e3a !important;
      border-color: #c41e3a !important;
    }

    /* Links */
    a {
      color: #e61318 !important;
    }

    a:visited {
      color: #c41e3a !important;
    }

    a:hover {
      color: #c41e3a !important;
    }

    .md-typeset a {
      color: #e61318 !important;
    }

    .md-typeset a:visited {
      color: #c41e3a !important;
    }

    .md-typeset a:hover {
      color: #c41e3a !important;
    }

    /* Navegação */
    .md-nav__link--active {
      color: #e61318 !important;
    }

    .md-nav__link:hover {
      color: #e61318 !important;
    }

    .md-nav__title {
      color: #e61318 !important;
    }

    /* Busca */
    .md-search-result__link {
      border-left-color: #e61318 !important;
    }

    .md-search-result__link:hover {
      background-color: rgba(230, 19, 24, 0.1) !important;
    }

    .md-search-result__link--active {
      background-color: rgba(230, 19, 24, 0.2) !important;
    }

    /* Focus outlines */
    .md-button:focus-visible,
    .md-nav__link:focus-visible,
    .md-search__input:focus-visible {
      outline-color: #e61318 !important;
    }

    /* Admonições */
    .md-typeset .admonition {
      border-left-color: #e61318 !important;
    }

    .md-typeset .note {
      border-left-color: #e61318 !important;
    }

    /* Inline code */
    .md-typeset code {
      background-color: rgba(230, 19, 24, 0.1) !important;
      color: #e61318 !important;
    }

    /* Highlights */
    .md-typeset .highlight {
      background-color: inherit;
    }

    /* Footer links */
    .md-footer-meta a:hover {
      color: #e61318 !important;
    }

    /* Remove pink e orange themes se existirem */
    [data-md-color-primary=pink],
    [data-md-color-primary=deep-orange],
    [data-md-color-accent=pink],
    [data-md-color-accent=deep-orange] {
      display: none !important;
    }

    /* Força código de destaque para vermelho */
    .highlight .nb,
    .highlight .nc,
    .highlight .no,
    .highlight .nf {
      color: #e61318 !important;
    }

    /* Sidebar */
    .md-sidebar__inner {
      border-color: #e61318 !important;
    }

    /* Tooltips */
    .md-tooltip {
      background-color: #e61318 !important;
      color: #fff !important;
    }

    /* Status badges */
    .md-status {
      background-color: #e61318 !important;
      color: #fff !important;
    }
  </style>
{% endblock %}
