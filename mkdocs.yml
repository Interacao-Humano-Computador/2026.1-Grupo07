site_name: IHC Grupo 7 - CIEE
theme:
  name: material
  palette:
    - scheme: default
      primary: black
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - scheme: slate
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
    - content.code.copy
nav:
  - Home: index.md
  - Cronograma Planejado: cronograma.md
  - Ferramentas: ferramentas.md
  - Processo de Design: processoDesign.md
  - Atas de reunião: 
      - Reunião 1: reuniao1.md
      - Reunião 2: reuniao2.md
