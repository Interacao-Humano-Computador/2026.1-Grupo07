site_name: IHC Grupo 7
theme:
  name: material
  custom_dir: docs/overrides
  favicon: assets/favicon-gota-vermelha.svg
  logo: assets/logo-sabin-5.jpeg
  language: pt-BR
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
    - content.code.copy
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.share
    - content.code.annotate
    - header.autohide
nav:
  - Home: index.md
  - Planejamento:
      - Cronograma: 
          - Heatmap: planejamento/heatmap.md
          - Planejado: planejamento/cronograma.md
          - Executado: planejamento/cronogramaexec.md
      - Processo de Design: planejamento/processoDesign.md
      - Sites avaliados: planejamento/listasites.md
  - Análise de Requisitos: 
      - Perfil de usuário: requisitos/perfilDeUsuario.md
      - Metodologia:
        - Aspectos éticos: requisitos/Aspectoseticos.md
        - Brainstorming: requisitos/brainstorming.md
        - Entrevista: 
          - Entrevista Realizada: requisitos/entrevista.md
          - Roteiro da entrevista: requisitos/roteiroEntrevista.md
        # - Grupo De Foco: requisitos/grupoDeFoco.md
        - Questionário: requisitos/questionario.md
        - Análise Documental: requisitos/analiseDeDocumentos.md
      - Análise de tarefas: requisitos/analisedetarefa.md
      - Personas: requisitos/persona.md
      - Cenário: requisitos/cenario.md
      - Características da Plataforma: requisitos/caracteristicasDaPlataforma.md
      - Princípios e Diretrizes Gerais:
        - Princípios Gerais: requisitos/principios.md
        - Metas de Usabilidade: requisitos/metasDeUsabilidade.md
      - Guia de Estilo: requisitos/guiaDeEstilo.md
