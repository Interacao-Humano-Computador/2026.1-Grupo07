          - Entrega 02 - Grupo 01: verificacoes/verificacaoE2G1.md
          - Entrega 03 - Grupo 01: verificacoes/verificacaoE3G1.md
          - Entrega 04 - Grupo 06: verificacoes/verificacaoE4G6.md
